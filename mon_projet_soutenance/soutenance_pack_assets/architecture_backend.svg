<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900">
      <defs>
        <marker id="arrow-head" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
          <path d="M0,0 L12,6 L0,12 z" fill="#233a7c" />
        </marker>
      </defs>
      <style>
        .bg { fill: #f7f9ff; }
        .box { filter: drop-shadow(0 10px 24px rgba(18, 27, 83, 0.08)); }
        .label { font-family: Arial, Helvetica, sans-serif; font-size: 18px; fill: #122053; font-weight: 600; }
        .small-label { font-family: Arial, Helvetica, sans-serif; font-size: 16px; fill: #122053; font-weight: 600; }
        .edge-label { font-family: Arial, Helvetica, sans-serif; font-size: 14px; fill: #30498d; font-weight: 600; }
        .strong-label { font-weight: 700; }
        .actor circle, .actor line { stroke: #122053; stroke-width: 3; fill: none; }
        .arrow { stroke: #233a7c; stroke-width: 2.8; marker-end: url(#arrow-head); }
      </style>
      <rect class="bg" x="0" y="0" width="1440" height="900" rx="28" />
      
      
    <rect x="80" y="110" width="240" height="90" rx="22" ry="22" fill="#eef5ff" stroke="#2c44b6" stroke-width="2.5" class="box" />
    
    <text x="200" y="159" text-anchor="middle" class="label">
      <tspan x="200" dy="0">App Router\n/api/*/route.ts</tspan>
    </text>
  
  
      
    <rect x="380" y="110" width="240" height="90" rx="22" ry="22" fill="#eef5ff" stroke="#2c44b6" stroke-width="2.5" class="box" />
    
