<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 860">
      <defs>
        <marker id="arrow-head" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
          <path d="M0,0 L12,6 L0,12 z" fill="#233a7c" />
        </marker>
      </defs>
      <style>
        .bg { fill: #f7f9ff; }
        .box { filter: drop-shadow(0 10px 24px rgba(18, 27, 83, 0.08)); }
        .label { font-family: Arial, Helvetica, sans-serif; font-size: 18px; fill: #122053; font-weight: 600; }
        .small-label { font-family: Arial, Helvetica, sans-serif; font-size: 16px; fill: #122053; font-weight: 600; }
        .edge-label { font-family: Arial, Helvetica, sans-serif; font-size: 14px; fill: #30498d; font-weight: 600; }
        .strong-label { font-weight: 700; }
        .actor circle, .actor line { stroke: #122053; stroke-width: 3; fill: none; }
        .arrow { stroke: #233a7c; stroke-width: 2.8; marker-end: url(#arrow-head); }
      </style>
      <rect class="bg" x="0" y="0" width="1440" height="860" rx="28" />
      
      
    <rect x="70" y="140" width="220" height="110" rx="22" ry="22" fill="#ffffff" stroke="#2c44b6" stroke-width="2.5" class="box" />
    
    <text x="180" y="199" text-anchor="middle" class="label">
      <tspan x="180" dy="0">Utilisateur\nWeb / Mobile / Desktop</tspan>
    </text>
  
  
      
    <rect x="370" y="80" width="280" height="120" rx="22" ry="22" fill="#eef5ff" stroke="#2c44b6" stroke-width="2.5" class="box" />
    
    <text x="510" y="144" text-anchor="middle" class="label">
      <tspan x="510" dy="0">Frontend React / Vite\nMainLayout, Pages, UI, Zustand\nElectron optionnel</tspan>
    </text>
  
  
      
    <rect x="370" y="260" width="280" height="120" rx="22" ry="22" fill="#eef5ff" stroke="#2c44b6" stroke-width="2.5" class="box" />
    
    <text x="510" y="324" text-anchor="middle" class="label">
      <tspan x="510" dy="0">Services frontend\nAPI, runtimeConfig, upload,\npdfUtils, syncQueue</tspan>
    </text>
  
  
      
    <rect x="740" y="80" width="300" height="120" rx="22" ry="22" fill="#eef5ff" stroke="#2c44b6" stroke-width="2.5" class="box" />
    
    <text x="890" y="144" text-anchor="middle" class="label">
      <tspan x="890" dy="0">Next Backend App Router\nRoutes API / middlewares\ncontrollers / DTO / Zod</tspan>
    </text>
  
  
      
    <rect x="740" y="260" width="300" height="120" rx="22" ry="22" fill="#eef5ff" stroke="#2c44b6" stroke-width="2.5" class="box" />
    
    <text x="890" y="324" text-anchor="middle" class="label">
      <tspan x="890" dy="0">Application &amp; domaine\nServices, builders, entites,\nDAO, repositories, notifications</tspan>
    </text>
  
  
      
    <rect x="1120" y="80" width="230" height="120" rx="22" ry="22" fill="#ffffff" stroke="#2c44b6" stroke-width="2.5" class="box" />
    
    <text x="1235" y="144" text-anchor="middle" class="label">
      <tspan x="1235" dy="0">PostgreSQL\nPrisma schema\nseeders</tspan>
    </text>
  
  
      
    <rect x="1120" y="260" width="230" height="120" rx="22" ry="22" fill="#ffffff" stroke="#2c44b6" stroke-width="2.5" class="box" />
    
    <text x="1235" y="324" text-anchor="middle" class="label">
      <tspan x="1235" dy="0">Services externes\nBrevo, Cloudinary,\nProvider paiement</tspan>
    </text>
  
  
      
    <rect x="740" y="470" width="300" height="120" rx="22" ry="22" fill="#eef5ff" stroke="#2c44b6" stroke-width="2.5" class="box" />
    
    <text x="890" y="534" text-anchor="middle" class="label">
      <tspan x="890" dy="0">Gouvernance et securite\nCSRF, JWT, cookies, TOTP,\naudit, blocage IP, maintenance</tspan>
    </text>
  
  
      
    <rect x="370" y="470" width="280" height="120" rx="22" ry="22" fill="#eef5ff" stroke="#2c44b6" stroke-width="2.5" class="box" />
    
    <text x="510" y="534" text-anchor="middle" class="label">
      <tspan x="510" dy="0">Pages metier\nClients, locations, paiements,\ndocuments, imports, settings</tspan>
    </text>
  
  
      
    <rect x="70" y="470" width="220" height="120" rx="22" ry="22" fill="#ffffff" stroke="#2c44b6" stroke-width="2.5" class="box" />
    
    <text x="180" y="534" text-anchor="middle" class="label">
      <tspan x="180" dy="0">Acteurs metier\nSuper Admin, Admin, Client</tspan>
    </text>
  
  

      
